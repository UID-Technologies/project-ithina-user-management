services:
  api:
    build: .
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: mongodb://mongo:27017/ithina-user-management
      JWT_SECRET: change-me-to-a-long-random-secret-in-production
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:8080
      LOG_LEVEL: info
      SEED_ADMIN_EMAIL: anjali@ithina.ai
      SEED_ADMIN_PASSWORD: SuperAdmin123!
    depends_on:
      - mongo
    volumes:
      - ./logs:/app/logs

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
