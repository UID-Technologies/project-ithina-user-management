openapi: 3.0.0
info:
  title: Ithina User Management API
  version: 1.0.0
  description: |
    Enterprise RBAC API backing the Superadmin Console (`smartsave` `/superadmin`).

    All superadmin routes require `Authorization: Bearer <JWT>` from `POST /api/v1/auth/login`.
    Platform personas (`r-super`, `r-platform`) have full scope; organization and tenant personas
    receive tenant-scoped data on read endpoints.
servers:
  - url: http://localhost:3002
    description: Local development
tags:
  - name: Auth
  - name: Dashboard
  - name: Search
  - name: Tenants
  - name: Organizations
  - name: Users
  - name: Roles
  - name: Permissions
  - name: ModuleAccess
  - name: Guardrails
  - name: Audit
  - name: Approvals
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data: {}
        meta:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            total: { type: integer }
    AuthProfile:
      type: object
      properties:
        id: { type: string }
        email: { type: string }
        name: { type: string }
        roleIds: { type: array, items: { type: string } }
        tenantId: { type: string }
        locationIds: { type: array, items: { type: string } }
        primaryRoleName: { type: string }
        tenantName: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [Auth]
      summary: Health check
      security: []
      responses:
        '200':
          description: Service healthy

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful — returns accessToken and enriched user profile

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user profile (persona, tenant, locations)
      responses:
        '200':
          description: Profile retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/AuthProfile'

  /api/v1/superadmin/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Platform KPI summary
      responses:
        '200':
          description: Dashboard summary metrics

  /api/v1/superadmin/dashboard/top-tenants:
    get:
      tags: [Dashboard]
      summary: Top tenants by user count
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 5 }
      responses:
        '200':
          description: Top tenants list

  /api/v1/superadmin/dashboard/recent-activity:
    get:
      tags: [Dashboard]
      summary: Recent audit activity for dashboard widget
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 6 }
      responses:
        '200':
          description: Recent audit entries

  /api/v1/superadmin/dashboard/platform-health:
    get:
      tags: [Dashboard]
      summary: Platform health status
      responses:
        '200':
          description: Health check result

  /api/v1/superadmin/search:
    get:
      tags: [Search]
      summary: Global search across tenants, users, roles
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Search results

  /api/v1/superadmin/tenants:
    get:
      tags: [Tenants]
      summary: List tenants (scoped for org/tenant personas)
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: tier, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        '200':
          description: Tenants retrieved
    post:
      tags: [Tenants]
      summary: Provision a new tenant (platform admin only)
      responses:
        '201':
          description: Tenant created

  /api/v1/superadmin/tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get tenant by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tenant retrieved
    put:
      tags: [Tenants]
      summary: Update tenant (platform admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tenant updated
    delete:
      tags: [Tenants]
      summary: Delete tenant (platform admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tenant deleted

  /api/v1/superadmin/organizations:
    get:
      tags: [Organizations]
      summary: List org locations (flat) for a tenant
      parameters:
        - in: query
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Locations retrieved
    post:
      tags: [Organizations]
      summary: Create org location node
      responses:
        '201':
          description: Location created

  /api/v1/superadmin/organizations/tree:
    get:
      tags: [Organizations]
      summary: Organization tree for a tenant
      parameters:
        - in: query
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tree retrieved

  /api/v1/superadmin/organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get location by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Location retrieved
    put:
      tags: [Organizations]
      summary: Update location
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Location updated
    delete:
      tags: [Organizations]
      summary: Delete location and descendants
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Location deleted

  /api/v1/superadmin/users:
    get:
      tags: [Users]
      summary: List users (tenant-scoped for workspace personas)
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: tenantId, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        '200':
          description: Users retrieved
    post:
      tags: [Users]
      summary: Create user (platform admin only)
      responses:
        '201':
          description: User created

  /api/v1/superadmin/users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User retrieved
    put:
      tags: [Users]
      summary: Update user (platform admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User updated
    delete:
      tags: [Users]
      summary: Delete user (platform admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User deleted

  /api/v1/superadmin/roles:
    get:
      tags: [Roles]
      summary: List roles
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: tenantId, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        '200':
          description: Roles retrieved
    post:
      tags: [Roles]
      summary: Create custom role (platform admin only)
      responses:
        '201':
          description: Role created

  /api/v1/superadmin/roles/{id}:
    get:
      tags: [Roles]
      summary: Get role by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Role retrieved
    put:
      tags: [Roles]
      summary: Update role (platform admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Role updated
    delete:
      tags: [Roles]
      summary: Delete role (platform admin only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Role deleted

  /api/v1/superadmin/permissions:
    get:
      tags: [Permissions]
      summary: List permission catalog
      parameters:
        - { in: query, name: module, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        '200':
          description: Permissions retrieved

  /api/v1/superadmin/permissions/role-map:
    get:
      tags: [Permissions]
      summary: Role id to permission ids map
      responses:
        '200':
          description: Role permission map

  /api/v1/superadmin/module-access/modules:
    get:
      tags: [ModuleAccess]
      summary: Module catalog
      responses:
        '200':
          description: Modules retrieved

  /api/v1/superadmin/module-access:
    get:
      tags: [ModuleAccess]
      summary: All tenant module access rows (platform admin only)
      responses:
        '200':
          description: Tenant module access list

  /api/v1/superadmin/module-access/{tenantId}:
    get:
      tags: [ModuleAccess]
      summary: Module access for one tenant
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Tenant module access
    patch:
      tags: [ModuleAccess]
      summary: Patch module access (platform admin only)
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Module access updated

  /api/v1/superadmin/module-access/{tenantId}/toggle:
    patch:
      tags: [ModuleAccess]
      summary: Toggle single module for tenant (platform admin only)
      parameters:
        - in: path
          name: tenantId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Module toggled

  /api/v1/superadmin/guardrails/rules:
    get:
      tags: [Guardrails]
      summary: List guardrail rules
      responses:
        '200':
          description: Guardrail rules
    post:
      tags: [Guardrails]
      summary: Create guardrail rule
      responses:
        '201':
          description: Rule created

  /api/v1/superadmin/guardrails/rules/{id}:
    get:
      tags: [Guardrails]
      summary: Get guardrail rule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rule retrieved
    put:
      tags: [Guardrails]
      summary: Update guardrail rule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rule updated
    delete:
      tags: [Guardrails]
      summary: Delete guardrail rule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Rule deleted

  /api/v1/superadmin/guardrails/events:
    get:
      tags: [Guardrails]
      summary: Guardrail events (e.g. 24h count)
      parameters:
        - { in: query, name: hours, schema: { type: integer } }
      responses:
        '200':
          description: Event count or list

  /api/v1/superadmin/audit:
    get:
      tags: [Audit]
      summary: Audit log (tenant-scoped for workspace personas)
      parameters:
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: tenant, schema: { type: string } }
        - { in: query, name: result, schema: { type: string, enum: [success, denied, pending] } }
        - { in: query, name: actor, schema: { type: string } }
        - { in: query, name: page, schema: { type: integer } }
        - { in: query, name: limit, schema: { type: integer } }
      responses:
        '200':
          description: Audit logs retrieved

  /api/v1/superadmin/approvals:
    get:
      tags: [Approvals]
      summary: Pending approvals
      responses:
        '200':
          description: Approvals list
